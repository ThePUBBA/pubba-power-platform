# Copy these placeholders into Streamlit's secret manager only after registering
# PUBBA Power with the organization's selected OIDC provider. Never commit real values.
[auth]
redirect_uri = "https://your-streamlit-host.example.com/oauth2callback"
cookie_secret = "replace-in-secret-manager"
client_id = "replace-in-secret-manager"
client_secret = "replace-in-secret-manager"
server_metadata_url = "https://identity.example.com/.well-known/openid-configuration"
expose_tokens = ["id"]
